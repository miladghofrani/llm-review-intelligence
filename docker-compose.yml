version: "3.8"

services:
  llm-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: company_llm_container
    volumes:
      - .:/app
    ports:
      - "8742:8742"
    stdin_open: true
    tty: true
    environment:
      - PYTHONUNBUFFERED=1
      - AWS_DEFAULT_REGION=eu-central-1
      - HF_TOKEN=${HF_TOKEN}
